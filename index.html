    <script>
      // Aplica o tema salvo (ou a preferência do sistema) antes do primeiro
      // paint, evitando flash de tema errado — useTheme.ts assume o controle depois.
      (function () {
        try {
          var stored = localStorage.getItem('portfolio-theme');
          var isDark = stored ? stored === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.classList.toggle('dark', isDark);
        } catch (e) {
          /* localStorage indisponível (modo privado etc.) — segue com o tema claro padrão. */
        }
      })();
    </script>
