  <text x="80" y="380" font-family="'Space Grotesk','Inter',sans-serif" font-weight="700" font-size="38" fill="#eef6fb">Automação de Cadastro</text>
  <text x="80" y="414" font-family="'Inter',sans-serif" font-weight="500" font-size="19" fill="#ffd43b">Python &#183; Pandas &#183; Selenium</text>
