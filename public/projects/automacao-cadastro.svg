      <rect x="152" y="46" width="36" height="10" rx="3" />
      <rect x="12" y="78" width="46" height="10" rx="3" />
      <rect x="82" y="78" width="46" height="10" rx="3" />
      <rect x="152" y="78" width="36" height="10" rx="3" />
      <rect x="12" y="110" width="46" height="10" rx="3" />
      <rect x="82" y="110" width="46" height="10" rx="3" />
      <rect x="152" y="110" width="36" height="10" rx="3" />
    </g>
