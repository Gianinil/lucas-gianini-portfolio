  <g transform="translate(500,90)">
    <rect x="0" y="0" width="230" height="220" rx="14" fill="#132433" stroke="#22384a" stroke-width="1.5" />
    <circle cx="20" cy="18" r="5" fill="#ef4444" opacity="0.6" />
    <circle cx="36" cy="18" r="5" fill="#facc15" opacity="0.6" />
    <circle cx="52" cy="18" r="5" fill="#22c55e" opacity="0.6" />
