  <!-- automation flow -->
  <g transform="translate(320,175)" stroke="#ffd43b" stroke-width="2.5" fill="none">
    <path d="M0 30 h60" />
    <path d="M52 22 l12 8 -12 8 z" fill="#ffd43b" stroke="none" />
  </g>
  <circle cx="400" cy="205" r="24" fill="none" stroke="#3776ab" stroke-width="2.5" />
