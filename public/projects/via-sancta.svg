<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a1410" />
      <stop offset="1" stop-color="#0d0a08" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#caa15d" />
      <stop offset="1" stop-color="#e8c78a" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#g)" />
  <rect x="0" y="0" width="800" height="6" fill="url(#accent)" />

  <!-- phone frame -->
  <g transform="translate(300,50)">
    <rect x="0" y="0" width="200" height="360" rx="28" fill="#171310" stroke="#3a2f22" stroke-width="2" />
