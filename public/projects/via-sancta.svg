    <text x="100" y="58" text-anchor="middle" font-family="'Inter',sans-serif" font-weight="600" font-size="14" fill="#e8c78a">Orações do dia</text>

    <g font-family="'Inter',sans-serif" font-size="12">
      <rect x="16" y="76" width="168" height="46" rx="10" fill="#221b14" stroke="#3a2f22" stroke-width="1" />
      <circle cx="34" cy="99" r="9" fill="#caa15d" opacity="0.6" />
      <rect x="52" y="90" width="110" height="8" rx="4" fill="#5a4a34" />
      <rect x="52" y="104" width="70" height="7" rx="4" fill="#3a2f22" />

      <rect x="16" y="130" width="168" height="46" rx="10" fill="#221b14" stroke="#3a2f22" stroke-width="1" />
      <circle cx="34" cy="153" r="9" fill="#e8c78a" opacity="0.6" />
      <rect x="52" y="144" width="120" height="8" rx="4" fill="#5a4a34" />
      <rect x="52" y="158" width="80" height="7" rx="4" fill="#3a2f22" />

      <rect x="16" y="184" width="168" height="46" rx="10" fill="#221b14" stroke="#3a2f22" stroke-width="1" />
      <circle cx="34" cy="207" r="9" fill="#caa15d" opacity="0.6" />
      <rect x="52" y="198" width="100" height="8" rx="4" fill="#5a4a34" />
