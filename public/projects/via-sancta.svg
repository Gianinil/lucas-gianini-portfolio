    <rect x="0" y="320" width="200" height="40" rx="0" fill="#171310" />
    <circle cx="60" cy="340" r="7" fill="#5a4a34" />
    <circle cx="100" cy="340" r="7" fill="#e8c78a" />
    <circle cx="140" cy="340" r="7" fill="#5a4a34" />
