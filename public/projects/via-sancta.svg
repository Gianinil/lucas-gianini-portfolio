  <text x="80" y="380" font-family="'Space Grotesk','Inter',sans-serif" font-weight="700" font-size="42" fill="#faf6ee">Via Sancta</text>
  <text x="80" y="416" font-family="'Inter',sans-serif" font-weight="500" font-size="19" fill="#caa15d">App mobile &#183; Expo / React Native</text>
