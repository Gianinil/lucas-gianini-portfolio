<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecionando…</title>
    <script>
      // GitHub Pages serves this file for any unknown path. This site is a
      // single page with hash-based section anchors (no client-side router),
      // so an unknown path is almost always a stale link — send the visitor
      // back to the app, preserving any hash so deep links still land right.
      var base = '/lucas-gianini-portfolio/';
      window.location.replace(base + window.location.hash);
    </script>
  </head>
  <body>
    <p>Redirecionando para <a href="/lucas-gianini-portfolio/">a página inicial</a>…</p>
  </body>
</html>
